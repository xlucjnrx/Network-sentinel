<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Sentinel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --accent:    #00ff88;
      --accent-dim:#00cc6a;
      --danger:    #ff4d4d;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 16px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .shield {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-label span:first-child {
      font-weight: 500;
      font-size: 13px;
    }

    #statusText {
      font-size: 11px;
      font-family: var(--mono);
    }

    .status-on  { color: var(--accent); }
    .status-off { color: var(--danger); }

    /* ── Toggle switch ── */
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #2d333b;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .switch input:checked + .slider { background: #0d3320; }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Stats card ── */
    .stats {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .stats-label {
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stats-count {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stats-count.inactive {
      color: var(--muted);
    }

    .stats-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Reset button ── */
    .btn-reset {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 7px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover {
      border-color: var(--danger);
      color: var(--danger);
    }
    /* ── Logger button ── */
    .btn-logger {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 7px;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-logger:hover {
      border-color: var(--accent);
      background: rgba(0,255,136,0.06);
    }
  </style>
</head>
<body>

  <div class="header">
    <!-- Shield SVG inline so it works without extra assets -->
    <svg class="shield" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2L4 6v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V6L14 2z"
            fill="#0d3320" stroke="#00ff88" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M10 14l3 3 5-5" stroke="#00ff88" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="header-text">
      <h1>NETWORK SENTINEL</h1>
      <p>Network-level ad blocker</p>
    </div>
  </div>

  <hr>

  <div class="toggle-row">
    <div class="toggle-label">
      <span>Ad Blocking</span>
      <span id="statusText" class="status-on">ACTIVE</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleBlock" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats">
    <div class="stats-label">Requests blocked</div>
    <div class="stats-count" id="blockedCount">0</div>
    <div class="stats-sub">this session</div>
  </div>

  <button class="btn-reset" id="resetBtn">RESET COUNT</button>
  <button class="btn-logger" id="loggerBtn">⬡ OPEN REQUEST LOG</button>

  <script src="popup.js"></script>
</body>
</html>
