<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Network Sentinel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #21262d;
      --accent:    #00ff88;
      --danger:    #ff4d4d;
      --warn:      #e3b341;
      --info:      #58a6ff;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 8px;
    }

    .toolbar-brand svg { width: 20px; height: 20px; }

    .toolbar-brand span {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .divider-v {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px 5px 28px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn:hover            { border-color: var(--text); color: var(--text); }
    .btn.btn-danger:hover { border-color: var(--danger); color: var(--danger); }

    #pauseBtn.paused { border-color: var(--warn); color: var(--warn); }

    .statsbar {
      display: flex;
      gap: 20px;
      padding: 6px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-blocked  { background: var(--danger); box-shadow: 0 0 4px var(--danger); }
    .dot-beacon   { background: var(--warn);   box-shadow: 0 0 4px var(--warn); }
    .dot-pixel    { background: var(--info);   box-shadow: 0 0 4px var(--info); }

    .stat-count { color: var(--text); font-weight: 600; }
    .stat-label { color: var(--muted); }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 1.5s infinite;
      margin-left: auto;
    }

    .live-dot.paused { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .table-head {
      display: grid;
      grid-template-columns: 72px 90px 1fr 60px;
      gap: 0;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .table-head span {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .log-container::-webkit-scrollbar { width: 6px; }
    .log-container::-webkit-scrollbar-track { background: transparent; }
    .log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-row {
      display: grid;
      grid-template-columns: 72px 90px 1fr 60px;
      gap: 0;
      padding: 5px 16px;
      border-bottom: 1px solid rgba(33,38,45,0.5);
      font-family: var(--mono);
      font-size: 11px;
      transition: background 0.1s;
      cursor: default;
    }

    .log-row:hover { background: var(--surface); }

    .log-row.hidden { display: none; }

    .log-type {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .badge-blocked { background: rgba(255,77,77,0.15);    color: var(--danger); border: 1px solid rgba(255,77,77,0.3); }
    .badge-beacon  { background: rgba(227,179,65,0.15);   color: var(--warn);   border: 1px solid rgba(227,179,65,0.3); }
    .badge-pixel   { background: rgba(88,166,255,0.15);   color: var(--info);   border: 1px solid rgba(88,166,255,0.3); }
    .badge-fetch   { background: rgba(188,140,255,0.15);  color: #bc8cff;       border: 1px solid rgba(188,140,255,0.3); }
    .badge-canvas  { background: rgba(0,255,136,0.10);    color: var(--accent); border: 1px solid rgba(0,255,136,0.2); }

    .log-time  { color: var(--muted); }
    .log-host  { color: var(--warn); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
    .log-url   { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-url span.highlight { color: var(--text); }
    .log-tab   { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      color: var(--muted);
    }

    .empty svg { opacity: 0.2; }
    .empty p { font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em; }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-brand">
      <svg viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 6v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V6L14 2z"
              fill="#0d3320" stroke="#00ff88" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 14l3 3 5-5" stroke="#00ff88" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>NETWORK SENTINEL</span>
    </div>

    <div class="divider-v"></div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Filter by URL or host…">
    </div>

    <button class="btn" id="pauseBtn">⏸ PAUSE</button>
    <button class="btn btn-danger" id="clearBtn">✕ CLEAR</button>
    <button class="btn" id="exportBtn">↓ EXPORT</button>
  </div>

  <div class="statsbar">
    <div class="stat-item">
      <div class="stat-dot dot-blocked"></div>
      <span class="stat-count" id="countBlocked">0</span>
      <span class="stat-label">blocked</span>
    </div>
    <div class="stat-item">
      <div class="stat-dot dot-beacon"></div>
      <span class="stat-count" id="countBeacon">0</span>
      <span class="stat-label">beacons</span>
    </div>
    <div class="stat-item">
      <div class="stat-dot dot-pixel"></div>
      <span class="stat-count" id="countPixel">0</span>
      <span class="stat-label">pixels</span>
    </div>
    <div class="stat-item">
      <span class="stat-count" id="countTotal">0</span>
      <span class="stat-label">total</span>
    </div>
    <div class="live-dot" id="liveDot"></div>
  </div>

  <div class="table-head">
    <span>Type</span>
    <span>Time</span>
    <span>URL</span>
    <span>Tab</span>
  </div>

  <div class="log-container" id="logContainer">
    <div class="empty" id="emptyState">
      <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
        <path d="M14 2L4 6v8c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V6L14 2z"
              stroke="#7d8590" stroke-width="1.5"/>
      </svg>
      <p>Waiting for blocked requests…</p>
    </div>
  </div>

  <script src="logger.js"></script>
</body>
</html>
